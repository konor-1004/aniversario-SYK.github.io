const mensajesIncorrectos = [

  "ay ño amol esha ño 😔",

let preguntaActual = 0;

function iniciarQuiz() {
  preguntaActual = 0;
  mostrarPregunta();
}

function mostrarPregunta() {
  const pregunta = preguntas[preguntaActual];
  const contenedorOpciones = document.getElementById("opcionesQuiz");
  const textoPregunta = document.getElementById("preguntaActual");
  const resultado = document.getElementById("resultadoQuiz");
  const progreso = document.getElementById("progresoQuiz");
  const botones = document.getElementById("botonesQuiz");

  resultado.innerText = "";
  botones.innerHTML = "";

  textoPregunta.innerText = pregunta.pregunta;
  progreso.innerText = `Pregunta ${preguntaActual + 1} de ${preguntas.length}`;

  contenedorOpciones.innerHTML = "";

  pregunta.opciones.forEach((opcion, index) => {
    const btn = document.createElement("button");
    btn.innerText = opcion;
    btn.onclick = () => responderQuiz(index);
    contenedorOpciones.appendChild(btn);
  });
}

function responderQuiz(indiceElegido) {
  const pregunta = preguntas[preguntaActual];
  const resultado = document.getElementById("resultadoQuiz");
  const botones = document.getElementById("botonesQuiz");

  botones.innerHTML = "";

  if (indiceElegido === pregunta.correcta) {
    // ✅ CORRECTA
    const mensaje = pregunta.mensajeCorrecto;
    resultado.innerText = mensaje;

    const btnContinuar = document.createElement("button");
    btnContinuar.innerText = (preguntaActual === preguntas.length - 1) ? "Ver felicitaciones 🎉" : "Continuar";
    btnContinuar.onclick = siguientePregunta;
    botones.appendChild(btnContinuar);

  } else {
    // ❌ INCORRECTA
    const mensaje = mensajesIncorrectos[Math.floor(Math.random() * mensajesIncorrectos.length)];
    resultado.innerText = mensaje;

    const btnRepetir = document.createElement("button");
    btnRepetir.innerText = "Repetir";
    btnRepetir.onclick = mostrarPregunta;
    botones.appendChild(btnRepetir);
  }
}

function siguientePregunta() {
  if (preguntaActual < preguntas.length - 1) {
    preguntaActual++;
    mostrarPregunta();
  } else {
    mostrarFelicitaciones();
  }
}

function mostrarFelicitaciones() {
  const contenedorOpciones = document.getElementById("opcionesQuiz");
  const textoPregunta = document.getElementById("preguntaActual");
  const resultado = document.getElementById("resultadoQuiz");
  const progreso = document.getElementById("progresoQuiz");
  const botones = document.getElementById("botonesQuiz");

  textoPregunta.innerText = "¡Terminaste el quiz! 🎉";
  contenedorOpciones.innerHTML = "";
  resultado.innerText = "shiii, lo hiciste increíble mi vidaa ️💙❤️";
  progreso.innerText = "";

  botones.innerHTML = "";

  const btnReiniciar = document.createElement("button");
  btnReiniciar.innerText = "Repetir quiz";
  btnReiniciar.onclick = iniciarQuiz;
  botones.appendChild(btnReiniciar);
}
/* =========================
   LLUVIA SOLO AL BOTÓN
========================= */
function crearLluvia() {
  const contenedor = document.getElementById("contenedorLluvia");

  for (let i = 0; i < 20; i++) {
    const palabra = document.createElement("span");
    palabra.innerText = "te amo";
    palabra.style.left = Math.random() * window.innerWidth + "px";
    palabra.style.color = Math.random() < 0.5 ? "red" : "blue";
    palabra.style.fontSize = (Math.random() * 25 + 15) + "px";
    palabra.style.animationDuration = (Math.random() * 5 + 3) + "s";
    palabra.style.animationName = Math.random() < 0.5 ? "caer" : "subir";
    palabra.style.animationTimingFunction = "linear";
    palabra.style.animationFillMode = "forwards";

    palabra.addEventListener("animationend", () => palabra.remove());
    contenedor.appendChild(palabra);
  }
}
